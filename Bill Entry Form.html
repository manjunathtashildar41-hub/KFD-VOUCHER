<!DOCTYPE html>
<html lang="kn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Entry - KFD Voucher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Kannada', sans-serif;
            background-color: #f1f5f9;
            overflow-x: hidden;
        }

        /* Compact scrollable layout */
        #root {
            min-height: 100vh;
            padding: 16px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "", size = 18 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const numberToWords = (num) => {
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            const convert = (n) => {
                if (n < 20) return a[n];
                const digit = n % 10;
                if (n < 100) return b[Math.floor(n / 10)] + (digit !== 0 ? ' ' + a[digit] : '');
                if (n < 1000) return a[Math.floor(n / 100)] + 'Hundred ' + (n % 100 !== 0 ? 'and ' + convert(n % 100) : '');
                return '';
            };
            const amount = Math.floor(num);
            const paisa = Math.round((num - amount) * 100);
            let str = convert(amount) + " rupees";
            if (paisa > 0) str += " and " + convert(paisa) + " paisa";
            return str + " Only.";
        };

        function BillEntryApp() {
            const fileInputRef = useRef(null);
            const [isScanning, setIsScanning] = useState(false);
            const [saveStatus, setSaveStatus] = useState(null); // null | 'ok' | 'err'
            const [saveCount, setSaveCount] = useState(() => JSON.parse(localStorage.getItem('kfd_vouchers') || '[]').length);
            const [budgetHeads] = useState(() => JSON.parse(localStorage.getItem('kfd_heads') || '[]'));
            const [vendors] = useState(() => JSON.parse(localStorage.getItem('kfd_vendors') || '[]'));

            const [form, setForm] = useState({
                voucherType: 'bill', billCategory: 'General',
                division: 'S.F. Divn, Bagalkot', range: 'Badami (SF)',
                budgetHeadId: '', vendorId: '', particulars: '',
                year: localStorage.getItem('kfd_year') || '2025-26', billNumber: '',
                billDate: new Date().toISOString().split('T')[0],
                grossAmount: '0',
                deductGST: true, gstRate: '2',
                deductIT: true, itRate: '2',
                tokenNo: '', vr_no: '', so_no: '', fnb_no: '', p_no: ''
            });

            const selectedVendor = vendors.find(v => v.id.toString() === form.vendorId.toString());
            const selectedHead = budgetHeads.find(h => h.id.toString() === form.budgetHeadId.toString());
            const gross = parseFloat(form.grossAmount || 0);
            const gstVal = form.deductGST ? Math.round(gross * (parseFloat(form.gstRate) / 100)) : 0;
            const itVal = form.deductIT ? Math.round(gross * (parseFloat(form.itRate) / 100)) : 0;
            const netAmount = (gross - gstVal - itVal).toFixed(2);

            const buildParams = () => {
                const p = new URLSearchParams();
                p.set('vendorName', selectedVendor?.name || '');
                p.set('vendorId', selectedVendor?.receiptId || '');
                p.set('vendorCity', selectedVendor?.city || '');
                p.set('headCode', selectedHead?.code || '');
                p.set('division', form.division);
                p.set('range', form.range);
                p.set('year', form.year);
                p.set('billNo', form.billNumber);
                p.set('billDate', form.billDate);
                p.set('gross', gross.toFixed(2));
                p.set('gst', gstVal.toFixed(2));
                p.set('gstRate', form.gstRate);
                p.set('it', itVal.toFixed(2));
                p.set('itRate', form.itRate);
                p.set('net', netAmount);
                p.set('particulars', form.particulars);
                p.set('billCategory', form.billCategory);
                p.set('vr_no', form.vr_no);
                p.set('fnb_no', form.fnb_no);
                p.set('p_no', form.p_no);
                return p.toString();
            };

            // Print Voucher (S1–S5, no DCF)
            const openVoucher = () => {
                window.open(`Voucher Format (FAC 63).html?${buildParams()}&dcf=false`, '_blank');
            };

            // DCF Sign Mode (S1–S6, with DCF)
            const openDCF = () => {
                window.open(`Voucher Format (FAC 63).html?${buildParams()}&dcf=true`, '_blank');
            };

            // Order Copy Only
            const openOrderCopy = () => {
                window.open(`Office Order Copy.html?${buildParams()}`, '_blank');
            };

            const saveRecord = () => {
                try {
                    const vouchers = JSON.parse(localStorage.getItem('kfd_vouchers') || '[]');
                    const record = {
                        ...form,
                        netAmount,
                        gstAmount: gstVal.toFixed(2),
                        itAmount: itVal.toFixed(2),
                        grossAmount: gross.toFixed(2),
                        vendorName: selectedVendor?.name || '---',
                        headCode: selectedHead?.code || '---',
                        timestamp: Date.now()
                    };
                    vouchers.push(record);
                    localStorage.setItem('kfd_vouchers', JSON.stringify(vouchers));
                    setSaveCount(vouchers.length);
                    setSaveStatus('ok');
                    setTimeout(() => setSaveStatus(null), 3000);
                } catch (e) {
                    setSaveStatus('err');
                    setTimeout(() => setSaveStatus(null), 4000);
                    console.error('Save failed:', e);
                }
            };

            const f = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

            return (
                <div className="max-w-5xl mx-auto">
                    {/* Header */}
                    <div className="bg-white rounded-3xl shadow-xl border-l-8 border-green-800 p-5 mb-4 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-green-900 flex items-center gap-3">
                                <Icon name="file-text" size={24} /> BILL ENTRY DASHBOARD
                            </h1>
                            <p className="text-gray-400 font-bold uppercase text-[10px] tracking-widest mt-1">Official Voucher Generation System</p>
                        </div>
                        <div className="flex items-center gap-3">
                            {saveStatus === 'ok' && (
                                <div className="px-4 py-2 bg-green-100 border border-green-400 text-green-800 rounded-2xl text-xs font-black flex items-center gap-2 animate-pulse">
                                    <Icon name="check-circle" size={16} /> Saved! ({saveCount} records)
                                </div>
                            )}
                            {saveStatus === 'err' && (
                                <div className="px-4 py-2 bg-red-100 border border-red-400 text-red-800 rounded-2xl text-xs font-black flex items-center gap-2">
                                    <Icon name="alert-circle" size={16} /> Save failed!
                                </div>
                            )}
                            <a href="Main Board.html" className="p-3 bg-gray-50 rounded-2xl hover:bg-gray-200 transition-all flex items-center gap-2 text-xs font-bold text-gray-600">
                                <Icon name="chevron-left" size={20} /> Back
                            </a>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
                        {/* ===== LEFT FORM (3 cols) ===== */}
                        <div className="lg:col-span-3 bg-white rounded-3xl shadow-xl p-6 space-y-4">

                            {/* AI Scan */}
                            <div className="p-4 bg-blue-50 border-2 border-blue-200 border-dashed rounded-2xl flex items-center justify-between cursor-pointer group hover:bg-blue-100 transition-all"
                                onClick={() => fileInputRef.current.click()}>
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-3 rounded-xl text-white shadow-lg group-hover:scale-110 transition-all">
                                        <Icon name="upload" size={18} />
                                    </div>
                                    <div>
                                        <p className="font-black text-blue-900 text-xs uppercase">Auto-Fill with AI</p>
                                        <p className="text-[10px] text-blue-500 font-bold">Upload Bill Image or PDF</p>
                                    </div>
                                </div>
                                <Icon name="sparkles" className="text-blue-400 animate-pulse" size={22} />
                                <input type="file" ref={fileInputRef} hidden accept="image/*" />
                            </div>

                            {/* Work Category */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Work Category</label>
                                <input type="text" className="w-full p-3 mt-1 bg-gray-50 rounded-xl font-bold text-sm shadow-inner outline-none focus:ring-2 focus:ring-green-500"
                                    value={form.billCategory} onChange={e => f('billCategory', e.target.value)} />
                            </div>

                            {/* Budget Head + Vendor */}
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-2">Budget Head</label>
                                    <select className="w-full p-3 mt-1 bg-gray-50 rounded-xl font-bold text-sm shadow-inner outline-none"
                                        value={form.budgetHeadId} onChange={e => f('budgetHeadId', e.target.value)}>
                                        <option value="">-- Code --</option>
                                        {budgetHeads.map(h => <option key={h.id} value={h.id}>{h.code}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-2">Vendor</label>
                                    <select className="w-full p-3 mt-1 bg-gray-50 rounded-xl font-bold text-sm shadow-inner outline-none"
                                        value={form.vendorId} onChange={e => f('vendorId', e.target.value)}>
                                        <option value="">-- Payee --</option>
                                        {vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                    </select>
                                </div>
                            </div>

                            {/* Date / Bill No / Gross */}
                            <div className="grid grid-cols-3 gap-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Date</label>
                                    <input type="date" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none"
                                        value={form.billDate} onChange={e => f('billDate', e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Bill No</label>
                                    <input type="text" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none" placeholder="No"
                                        value={form.billNumber} onChange={e => f('billNumber', e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Gross (₹)</label>
                                    <input type="number" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none" placeholder="0.00"
                                        value={form.grossAmount} onChange={e => f('grossAmount', e.target.value)} />
                                </div>
                            </div>

                            {/* Particulars */}
                            <div>
                                <label className="text-[10px] font-black text-gray-400 uppercase ml-2">Particulars</label>
                                <textarea className="w-full p-3 mt-1 bg-gray-50 rounded-xl font-bold text-xs shadow-inner outline-none focus:ring-2 focus:ring-green-500 leading-relaxed"
                                    rows="3" placeholder="Enter detailed particulars..."
                                    value={form.particulars} onChange={e => f('particulars', e.target.value)} />
                            </div>

                            {/* GST / IT */}
                            <div className="grid grid-cols-2 gap-3">
                                <div className="p-4 bg-purple-50 rounded-2xl border border-purple-100">
                                    <label className="flex items-center gap-2 text-[10px] font-black uppercase text-purple-900">
                                        <input type="checkbox" className="w-4 h-4 accent-purple-600" checked={form.deductGST} onChange={e => f('deductGST', e.target.checked)} />
                                        Deduct GST %
                                    </label>
                                    <input type="number" className="w-full p-2 mt-2 bg-white rounded-lg font-black text-center text-sm outline-none"
                                        value={form.gstRate} onChange={e => f('gstRate', e.target.value)} />
                                </div>
                                <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                    <label className="flex items-center gap-2 text-[10px] font-black uppercase text-blue-900">
                                        <input type="checkbox" className="w-4 h-4 accent-blue-600" checked={form.deductIT} onChange={e => f('deductIT', e.target.checked)} />
                                        Deduct IT %
                                    </label>
                                    <input type="number" className="w-full p-2 mt-2 bg-white rounded-lg font-black text-center text-sm outline-none"
                                        value={form.itRate} onChange={e => f('itRate', e.target.value)} />
                                </div>
                            </div>

                            {/* Reference Numbers */}
                            <div className="grid grid-cols-3 gap-3 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Vr. No</label>
                                    <input type="text" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none"
                                        value={form.vr_no} onChange={e => f('vr_no', e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">FNB No</label>
                                    <input type="text" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none"
                                        value={form.fnb_no} onChange={e => f('fnb_no', e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">P. No</label>
                                    <input type="text" className="w-full p-2 mt-1 bg-white rounded-lg text-xs font-bold outline-none"
                                        value={form.p_no} onChange={e => f('p_no', e.target.value)} />
                                </div>
                            </div>
                        </div>

                        {/* ===== RIGHT PANEL (2 cols) ===== */}
                        <div className="lg:col-span-2 flex flex-col gap-4">
                            {/* Net Amount Card */}
                            <div className="bg-gray-900 text-white p-6 rounded-3xl shadow-2xl border-b-8 border-green-700 relative overflow-hidden">
                                <span className="text-[10px] uppercase font-black text-gray-500 tracking-[0.4em]">Final Net Payable</span>
                                <p className="text-5xl font-black mt-2 tracking-tighter">₹ {netAmount}</p>
                                <p className="text-[10px] text-green-400 font-black mt-3 italic leading-relaxed uppercase tracking-widest">{numberToWords(netAmount)}</p>
                                <Icon name="check-circle-2" className="absolute -right-8 top-6 opacity-5" size={140} />
                            </div>

                            {/* Breakdown */}
                            <div className="bg-white rounded-3xl shadow-xl p-4 space-y-2 text-sm font-bold">
                                <div className="flex justify-between text-gray-600">
                                    <span>Gross Amount</span>
                                    <span>₹ {gross.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-purple-700">
                                    <span>GST ({form.gstRate}%)</span>
                                    <span>- ₹ {gstVal.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-blue-700">
                                    <span>IT ({form.itRate}%)</span>
                                    <span>- ₹ {itVal.toFixed(2)}</span>
                                </div>
                                <div className="flex justify-between text-green-800 border-t pt-2 text-base font-black">
                                    <span>Net Payable</span>
                                    <span>₹ {netAmount}</span>
                                </div>
                            </div>

                            {/* Action Buttons */}
                            <div className="bg-white rounded-3xl shadow-xl p-4 space-y-3">
                                <button onClick={saveRecord}
                                    className="w-full p-4 bg-white border-4 border-green-100 text-green-700 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 shadow hover:bg-green-50 transition-all active:scale-95">
                                    <Icon name="save" size={18} /> Update Voucher Ledger
                                </button>

                                <button onClick={openVoucher}
                                    className="w-full p-4 bg-black text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 shadow-2xl hover:bg-gray-800 transition-all active:scale-95">
                                    <Icon name="printer" size={18} /> Print Voucher &amp; Order (RFO)
                                </button>

                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={openDCF}
                                        className="p-4 bg-blue-700 text-white rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 shadow hover:bg-blue-800 transition-all active:scale-95">
                                        <Icon name="shield-check" size={16} /> DCF Sign Mode
                                    </button>
                                    <button onClick={openOrderCopy}
                                        className="p-4 bg-purple-700 text-white rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 shadow hover:bg-purple-800 transition-all active:scale-95">
                                        <Icon name="file-spreadsheet" size={16} /> Order Copy Only
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BillEntryApp />);
    </script>
</body>

</html>
