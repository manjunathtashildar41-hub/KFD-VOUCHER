<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Head - KFD Voucher Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .row-card {
            transition: all 0.15s;
        }

        .row-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-slate-100 min-h-screen p-6 md:p-10">
    <div class="max-w-2xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black text-blue-900 uppercase tracking-tight">Budget Head Entry</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest mt-0.5">KFD · Badami SF Range</p>
            </div>
            <a href="Main Board.html"
                class="flex items-center gap-2 text-xs font-black uppercase text-gray-500 hover:text-blue-700 transition-all border border-gray-200 px-4 py-2 rounded-xl hover:border-blue-300 bg-white">
                ← Back
            </a>
        </div>

        <!-- Add / Edit Form Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 mb-8">
            <h2 id="form-title" class="text-sm font-black uppercase text-gray-400 tracking-widest mb-6">Add New Budget
                Head</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-black uppercase text-gray-500 mb-1.5 block">Head Code</label>
                    <input id="headCode"
                        class="w-full px-5 py-4 bg-gray-50 rounded-2xl border-2 border-transparent font-black text-blue-900 text-lg outline-none focus:border-blue-400 focus:bg-white transition-all"
                        placeholder="e.g. 2406-00-110-0-02">
                </div>
                <div>
                    <label class="text-xs font-black uppercase text-gray-500 mb-1.5 block">Description</label>
                    <input id="headDesc"
                        class="w-full px-5 py-4 bg-gray-50 rounded-2xl border-2 border-transparent font-semibold text-gray-700 outline-none focus:border-blue-400 focus:bg-white transition-all"
                        placeholder="Budget Head Description (optional)">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button id="submit-btn" onclick="submitHead()"
                    class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-black rounded-2xl uppercase tracking-widest shadow-lg shadow-blue-200 transition-all">
                    Add Budget Head
                </button>
                <button id="cancel-btn" onclick="cancelEdit()"
                    class="hidden px-6 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-black rounded-2xl uppercase text-xs tracking-widest transition-all">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Saved Heads List -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="flex items-center justify-between px-8 py-5 border-b border-gray-100">
                <h2 class="text-sm font-black uppercase text-gray-500 tracking-widest">Saved Budget Heads</h2>
                <span id="head-count" class="text-xs font-black text-blue-400 bg-blue-50 px-3 py-1 rounded-full">0
                    heads</span>
            </div>
            <div id="headList" class="divide-y divide-gray-50 p-4 space-y-2"></div>
        </div>

    </div>

    <!-- Inline edit is done in-form, no extra modal needed -->

    <script>
        let editIdx = -1;

        const getHeads = () => JSON.parse(localStorage.getItem('kfd_heads') || '[]');
        const saveHeads = d => localStorage.setItem('kfd_heads', JSON.stringify(d));

        let pendingDeleteIdx = -1;

        function renderList() {
            const heads = getHeads();
            const list = document.getElementById('headList');
            const counter = document.getElementById('head-count');
            counter.textContent = heads.length + ' head' + (heads.length !== 1 ? 's' : '');

            if (heads.length === 0) {
                list.innerHTML = `
                    <div class="py-12 text-center">
                        <div class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-4">
                            <svg width="24" height="24" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                        </div>
                        <p class="text-gray-400 font-black uppercase text-xs tracking-widest">No budget heads added yet</p>
                    </div>`;
                return;
            }

            list.innerHTML = heads.map((h, i) => {
                const isPending = pendingDeleteIdx === i;
                const isEditing = editIdx === i;
                return `
                <div class="row-card flex items-center justify-between p-4 rounded-2xl border transition-all
                    ${isPending ? 'bg-red-50 border-red-200' : isEditing ? 'bg-blue-50 border-blue-200 ring-2 ring-blue-400' : 'bg-gray-50 border-gray-100'}">
                    <div class="flex-1 min-w-0 mr-4">
                        <p class="font-black text-blue-900 text-sm truncate">${escHtml(h.code)}</p>
                        ${h.description ? `<p class="text-gray-500 text-xs font-semibold mt-0.5 truncate">${escHtml(h.description)}</p>` : ''}
                        ${isPending ? `<p class="text-red-600 text-[10px] font-black mt-1 uppercase tracking-wide">⚠ Confirm delete?</p>` : ''}
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        ${isPending ? `
                            <button data-i="${i}" data-action="delete-confirm"
                                class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white text-[10px] font-black uppercase rounded-lg transition-all">
                                ✓ Yes, Delete
                            </button>
                            <button data-i="${i}" data-action="delete-cancel"
                                class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-[10px] font-black uppercase rounded-lg transition-all">
                                ✗ Cancel
                            </button>
                        ` : `
                            <button data-i="${i}" data-action="edit"
                                class="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-700 text-[10px] font-black uppercase rounded-lg transition-all">
                                Edit
                            </button>
                            <button data-i="${i}" data-action="delete"
                                class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-600 text-[10px] font-black uppercase rounded-lg transition-all">
                                Delete
                            </button>
                        `}
                    </div>
                </div>`;
            }).join('');
        }

        // Single event delegation — no confirm() dialog needed
        document.getElementById('headList').addEventListener('click', function (e) {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const i = parseInt(btn.dataset.i);
            const action = btn.dataset.action;
            if (action === 'delete') { pendingDeleteIdx = i; renderList(); }
            if (action === 'delete-confirm') { doDelete(i); }
            if (action === 'delete-cancel') { pendingDeleteIdx = -1; renderList(); }
            if (action === 'edit') { startEdit(i); }
        });

        function submitHead() {
            const code = document.getElementById('headCode').value.trim();
            const desc = document.getElementById('headDesc').value.trim();
            if (!code) {
                document.getElementById('headCode').focus();
                document.getElementById('headCode').classList.add('border-red-400');
                setTimeout(() => document.getElementById('headCode').classList.remove('border-red-400'), 1500);
                return;
            }
            const heads = getHeads();
            if (editIdx >= 0) {
                heads[editIdx].code = code;
                heads[editIdx].description = desc;
                editIdx = -1;
                document.getElementById('form-title').textContent = 'Add New Budget Head';
                document.getElementById('submit-btn').textContent = 'Add Budget Head';
                document.getElementById('cancel-btn').classList.add('hidden');
            } else {
                heads.push({ id: Date.now().toString(), code, description: desc });
            }
            saveHeads(heads);
            document.getElementById('headCode').value = '';
            document.getElementById('headDesc').value = '';
            pendingDeleteIdx = -1;
            renderList();
        }

        function startEdit(i) {
            const h = getHeads()[i];
            editIdx = i;
            pendingDeleteIdx = -1;
            document.getElementById('headCode').value = h.code;
            document.getElementById('headDesc').value = h.description || '';
            document.getElementById('form-title').textContent = 'Edit Budget Head';
            document.getElementById('submit-btn').textContent = 'Save Changes';
            document.getElementById('cancel-btn').classList.remove('hidden');
            document.getElementById('headCode').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderList();
        }

        function cancelEdit() {
            editIdx = -1;
            document.getElementById('headCode').value = '';
            document.getElementById('headDesc').value = '';
            document.getElementById('form-title').textContent = 'Add New Budget Head';
            document.getElementById('submit-btn').textContent = 'Add Budget Head';
            document.getElementById('cancel-btn').classList.add('hidden');
            renderList();
        }

        function doDelete(i) {
            if (editIdx === i) cancelEdit();
            const heads = getHeads();
            heads.splice(i, 1);
            saveHeads(heads);
            if (editIdx > i) editIdx--;
            pendingDeleteIdx = -1;
            renderList();
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.target.id === 'headCode' || e.target.id === 'headDesc')) submitHead();
        });

        renderList();
    </script>
</body>

</html>
